version: "3"

services:
  backend:
    build:
      context: backend
      dockerfile: Dockerfile
    container_name: resume-backend
    restart: always
    networks:
      - resume-network
    env_file:
      - ./backend/.env
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/ping" ]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    container_name: resume-frontend
    restart: always
    networks:
      - resume-network
    depends_on:
      - backend
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/api/ping" ]
      interval: 30s
      timeout: 10s
      retries: 3

  webserver:
    build:
      context: webserver
      dockerfile: Dockerfile
    container_name: resume-webserver
    restart: always
    networks:
      - resume-network
    expose:
      - 443
      - 80
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost" ]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  resume-network:
    external: true